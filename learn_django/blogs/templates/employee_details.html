{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static "css/style.css" %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class='container'>
   <div class="card mx-auto" style="width: 18rem;">
  <img src="{{ employee.photo.url }}" class="card-img-top" alt="...">
  <div class="card-body">
      <p class="card-text">{{ employee.first_name }} {{ employee.last_name }}</p>
      <p class="card-text">{{ employee.designation }}</p>
    <p class="card-text">{{ employee.email_address }}</p>
    <p class="card-text">{{ employee.phone_number }}</p>
    <p class='card-text small_text'>created at: {{ employee.created_at|date:'d-m-y' }}</p>
    <p class='card-text small_text'>updated at: {{ employee.updated_at|date:'d-m-y' }}</p>

  </div>
  <a class='btn btn-primary' href="{% url 'home' %}">Back to Home</a>
</div>
    
</body>
</html>
